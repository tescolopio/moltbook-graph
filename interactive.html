<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Knowledge Graph - Moltbook Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131a;
            --bg-card: #1a1a24;
            --accent: #00d4ff;
            --accent-dim: #008fb3;
            --text-primary: #e8e8f0;
            --text-secondary: #9999aa;
            --text-dim: #666677;
            --border: #2a2a35;
            --success: #00ff88;
            --warning: #ffaa00;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 0;
            min-height: 100vh;
        }
        
        .header-bar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 1rem;
        }
        
        .nav-link {
            padding: 0.5rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .nav-link:hover {
            background: var(--bg-secondary);
            color: var(--accent);
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .control-group label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 600;
        }
        
        input[type="range"] {
            width: 200px;
        }
        
        .legend {
            background: var(--bg-card);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.875rem;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        #network {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            height: 800px;
        }
        
        #tooltip {
            position: absolute;
            background: var(--bg-card);
            border: 1px solid var(--accent);
            padding: 0.75rem;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 0.875rem;
            z-index: 1000;
        }
        
        .node {
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .node:hover {
            stroke-width: 3px;
        }
        
        .link {
            stroke: var(--border);
            stroke-opacity: 0.6;
        }
        
        .link-highlighted {
            stroke: var(--accent);
            stroke-opacity: 1;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .stat-card {
            background: var(--bg-card);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <div class="logo">
            <span style="font-size: 1.75rem;">🧠</span>
            <span class="logo-text">Moltbook Intelligence</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">📊 Dashboard</a>
            <a href="interactive.html" class="nav-link" style="background: var(--bg-secondary); color: var(--accent);">🕸️ Interactive</a>
        </div>
    </div>

    <div class="container">
        <h1>Interactive Agent Network</h1>
        <p class="subtitle">Explore connections between AI agents in real-time. Drag nodes, zoom, and hover for details.</p>
        
        <div class="controls">
            <div class="control-group">
                <label>Minimum Connections: <span id="minConnectionsValue">1</span></label>
                <input type="range" id="minConnections" min="1" max="10" value="1">
            </div>
            
            <div class="control-group">
                <label>Node Size By:</label>
                <select id="nodeSizing" style="padding: 0.5rem; background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 4px;">
                    <option value="engagement">Engagement</option>
                    <option value="topics">Topics</option>
                    <option value="importance" selected>Importance</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Link Opacity: <span id="linkOpacityValue">0.6</span></label>
                <input type="range" id="linkOpacity" min="0" max="1" step="0.1" value="0.6">
            </div>
            
            <div class="legend">
                <strong style="color: var(--text-primary);">Legend:</strong>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--accent);"></div>
                    <span>High Importance</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--success);"></div>
                    <span>Medium Importance</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--warning);"></div>
                    <span>Low Importance</span>
                </div>
            </div>
        </div>
        
        <svg id="network"></svg>
        <div id="tooltip"></div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="nodeCount">0</div>
                <div class="stat-label">Visible Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="linkCount">0</div>
                <div class="stat-label">Connections</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgConnections">0</div>
                <div class="stat-label">Avg Connections</div>
            </div>
        </div>
    </div>

    <script>
        // Load data and initialize visualization
        Promise.all([
            d3.json('network_data.json'),
            d3.json('topic_data.json')
        ]).then(([networkData, topicData]) => {
            initializeNetwork(networkData);
        }).catch(error => {
            console.error('Error loading data:', error);
            document.getElementById('network').innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#ff6b6b">Error loading data. Please try again later.</text>';
        });
        
        function initializeNetwork(data) {
            const svg = d3.select('#network');
            const width = svg.node().getBoundingClientRect().width;
            const height = 800;
            
            svg.attr('viewBox', [0, 0, width, height]);
            
            const g = svg.append('g');
            
            // Add zoom
            const zoom = d3.zoom()
                .scaleExtent([0.1, 10])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });
            
            svg.call(zoom);
            
            // Color scale
            const importanceExtent = d3.extent(data.nodes, d => d.importance);
            const colorScale = d3.scaleLinear()
                .domain([importanceExtent[0], (importanceExtent[0] + importanceExtent[1]) / 2, importanceExtent[1]])
                .range(['#ffaa00', '#00ff88', '#00d4ff']);
            
            // Size scale
            function getNodeSize(node) {
                const sizing = document.getElementById('nodeSizing').value;
                const value = node[sizing];
                return Math.sqrt(value) * 2 + 5;
            }
            
            // Filter and render function
            function render() {
                const minConnections = +document.getElementById('minConnections').value;
                const linkOpacity = +document.getElementById('linkOpacity').value;
                
                // Count connections per node
                const connectionCounts = {};
                data.nodes.forEach(node => connectionCounts[node.id] = 0);
                data.links.forEach(link => {
                    connectionCounts[link.source.id || link.source]++;
                    connectionCounts[link.target.id || link.target]++;
                });
                
                // Filter nodes and links
                const filteredNodes = data.nodes.filter(node => connectionCounts[node.id] >= minConnections);
                const nodeIds = new Set(filteredNodes.map(n => n.id));
                const filteredLinks = data.links.filter(link => 
                    nodeIds.has(link.source.id || link.source) && 
                    nodeIds.has(link.target.id || link.target)
                );
                
                // Update stats
                document.getElementById('nodeCount').textContent = filteredNodes.length;
                document.getElementById('linkCount').textContent = filteredLinks.length;
                const avgConn = filteredNodes.length > 0 ? (filteredLinks.length * 2 / filteredNodes.length).toFixed(1) : 0;
                document.getElementById('avgConnections').textContent = avgConn;
                
                // Clear previous
                g.selectAll('*').remove();
                
                // Create simulation
                const simulation = d3.forceSimulation(filteredNodes)
                    .force('link', d3.forceLink(filteredLinks).id(d => d.id).distance(100))
                    .force('charge', d3.forceManyBody().strength(-300))
                    .force('center', d3.forceCenter(width / 2, height / 2))
                    .force('collision', d3.forceCollide().radius(d => getNodeSize(d) + 5));
                
                // Create links
                const link = g.append('g')
                    .selectAll('line')
                    .data(filteredLinks)
                    .join('line')
                    .attr('class', 'link')
                    .attr('stroke-width', d => Math.sqrt(d.value))
                    .style('stroke-opacity', linkOpacity);
                
                // Create nodes
                const node = g.append('g')
                    .selectAll('circle')
                    .data(filteredNodes)
                    .join('circle')
                    .attr('class', 'node')
                    .attr('r', getNodeSize)
                    .attr('fill', d => colorScale(d.importance))
                    .attr('stroke', '#ffffff')
                    .attr('stroke-width', 2)
                    .call(drag(simulation))
                    .on('mouseover', showTooltip)
                    .on('mouseout', hideTooltip)
                    .on('click', highlightConnections);
                
                // Simulation tick
                simulation.on('tick', () => {
                    link
                        .attr('x1', d => d.source.x)
                        .attr('y1', d => d.source.y)
                        .attr('x2', d => d.target.x)
                        .attr('y2', d => d.target.y);
                    
                    node
                        .attr('cx', d => d.x)
                        .attr('cy', d => d.y);
                });
            }
            
            // Drag behavior
            function drag(simulation) {
                function dragstarted(event) {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    event.subject.fx = event.subject.x;
                    event.subject.fy = event.subject.y;
                }
                
                function dragged(event) {
                    event.subject.fx = event.x;
                    event.subject.fy = event.y;
                }
                
                function dragended(event) {
                    if (!event.active) simulation.alphaTarget(0);
                    event.subject.fx = null;
                    event.subject.fy = null;
                }
                
                return d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended);
            }
            
            // Tooltip functions
            function showTooltip(event, d) {
                const tooltip = d3.select('#tooltip');
                tooltip.style('opacity', 1)
                    .html(`
                        <strong>${d.id}</strong><br>
                        Engagement: ${d.engagement.toLocaleString()}<br>
                        Topics: ${d.topics}<br>
                        Importance: ${d.importance.toFixed(2)}
                    `)
                    .style('left', (event.pageX + 10) + 'px')
                    .style('top', (event.pageY - 10) + 'px');
            }
            
            function hideTooltip() {
                d3.select('#tooltip').style('opacity', 0);
            }
            
            function highlightConnections(event, clickedNode) {
                const connectedNodes = new Set([clickedNode.id]);
                
                d3.selectAll('.link').each(function(link) {
                    if (link.source.id === clickedNode.id) {
                        connectedNodes.add(link.target.id);
                        d3.select(this).classed('link-highlighted', true);
                    } else if (link.target.id === clickedNode.id) {
                        connectedNodes.add(link.source.id);
                        d3.select(this).classed('link-highlighted', true);
                    } else {
                        d3.select(this).classed('link-highlighted', false);
                    }
                });
                
                d3.selectAll('.node')
                    .style('opacity', d => connectedNodes.has(d.id) ? 1 : 0.2);
            }
            
            // Control listeners
            document.getElementById('minConnections').addEventListener('input', (e) => {
                document.getElementById('minConnectionsValue').textContent = e.target.value;
                render();
            });
            
            document.getElementById('nodeSizing').addEventListener('change', render);
            
            document.getElementById('linkOpacity').addEventListener('input', (e) => {
                document.getElementById('linkOpacityValue').textContent = e.target.value;
                d3.selectAll('.link').style('stroke-opacity', e.target.value);
            });
            
            // Reset highlight on background click
            svg.on('click', (event) => {
                if (event.target === svg.node()) {
                    d3.selectAll('.link').classed('link-highlighted', false);
                    d3.selectAll('.node').style('opacity', 1);
                }
            });
            
            // Initial render
            render();
        }
    </script>
</body>
</html>
